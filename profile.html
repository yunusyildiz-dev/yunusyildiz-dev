<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card</title>
  <style>
    :root {
      --text: #000000;
      --link: #0000cc;
      --border: #cccccc;
      --stripe-bg: url("assets/img/lines.gif");
      --font-serif: "Georgia", "Palatino", "Times New Roman", serif;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-serif);
    }

    .profile-card {
      width: min(360px, 100%);
      margin: 0 0 0.75em;
      padding: 1.2em 1em;
      text-align: center;
      background: var(--stripe-bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-serif);
    }

    .profile-card__img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
      margin: 0 auto 0.8em;
      border: 3px solid var(--border);
    }

    .profile-card__name {
      font-size: 1.1rem;
      font-weight: bold;
      margin: 0 0 0.3em;
      color: var(--text);
    }

    .profile-card__tagline {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--link);
      margin: 0 0 0.5em;
    }

    .profile-card__desc {
      font-size: 0.8rem;
      line-height: 1.4;
      color: var(--text);
      opacity: 0.9;
      margin: 0 0 1em;
    }

    .profile-card__badges {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35em;
      margin-bottom: 0.8em;
    }

    .profile-card__badges-row {
      display: flex;
      justify-content: center;
      gap: 0.4em;
      flex-wrap: wrap;
    }

    .profile-card__badges-row a img {
      height: 20px;
      display: block;
      border-radius: 4px;
    }

    .profile-card__footer {
      font-size: 0.75rem;
      margin: 0 0 0.25em;
      color: var(--text);
      opacity: 0.85;
    }

    .profile-card__location {
      font-size: 0.7rem;
      font-style: italic;
      color: var(--text);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <img
      src="assets/img/profile.png"
      width="90"
      height="90"
      alt="Yunus YILDIZ"
      class="profile-card__img"
    />
    <h3 class="profile-card__name">Yunus YILDIZ</h3>
    <p class="profile-card__tagline">Always learning. Always building.</p>
    <p class="profile-card__desc">
      Transforming ideas into digital experiences.<br />
      Passionate about solving real-world challenges through technology.
    </p>

    <div class="profile-card__badges">
      <div class="profile-card__badges-row">
        <a href="https://github.com/yunusyildiz-dev" target="_blank" rel="noopener noreferrer">
          <img src="https://img.shields.io/badge/GitHub-100000?style=flat-square&logo=github&logoColor=white" alt="GitHub" />
        </a>
        <a href="https://www.linkedin.com/in/yunusyildiz-dev" target="_blank" rel="noopener noreferrer">
          <img src="https://img.shields.io/badge/LinkedIn-0A66C2?style=flat-square&logo=linkedin&logoColor=white" alt="LinkedIn" />
        </a>
        <a href="https://mastodon.social/@yunusyildiz_dev" target="_blank" rel="noopener noreferrer">
          <img src="https://img.shields.io/badge/Mastodon-6364FF?style=flat-square&logo=mastodon&logoColor=white" alt="Mastodon" />
        </a>
        <a href="https://bsky.app/profile/yunusyildiz.dev" target="_blank" rel="noopener noreferrer">
          <img src="https://img.shields.io/badge/Bluesky-0085FF?style=flat-square&logo=bluesky&logoColor=white" alt="Bluesky" />
        </a>
      </div>
      <div class="profile-card__badges-row">
        <a href="https://www.npmjs.com/~yunusyildiz" target="_blank" rel="noopener noreferrer">
          <img src="https://img.shields.io/badge/npm-CB3837?style=flat-square&logo=npm&logoColor=white" alt="npm" />
        </a>
        <a href="https://yunusyildiz.dev" target="_blank" rel="noopener noreferrer">
          <img src="https://img.shields.io/badge/Website-000000?style=flat-square&logo=google-chrome&logoColor=white" alt="Website" />
        </a>
        <a href="mailto:mail@yunusyildiz.dev" target="_blank" rel="noopener noreferrer">
          <img src="https://img.shields.io/badge/Email-D14836?style=flat-square&logo=gmail&logoColor=white" alt="Email" />
        </a>
      </div>
    </div>

    <p class="profile-card__footer">Built with ☕ and ❤️</p>
    <small class="profile-card__location" id="profile-location"></small>
  </div>

  <script>
    const month = new Date().toLocaleString("en-US", { month: "long" });
    const year = new Date().getFullYear();
    document.getElementById("profile-location").textContent = `‹ ${month} ${year} · Geneva, Switzerland ›`;
  </script>
</body>
</html>
